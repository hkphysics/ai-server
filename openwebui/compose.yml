services:
  jupyter:
    build:
      context: ../jupyter
    volumes:
      - ../jupyter/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - jupyter-data:/home
      - /mnt:/mnt
    ports:
      - 3002:8000
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_CALLBACK_URL: ${JUPYTER_OAUTH_CALLBACK_URL}
      ADMIN_USERS: ${ADMIN_USERS}
      ALLOWED_USERS: ${ALLOWED_USERS}

  openwebui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    volumes:
      - open-webui:/app/backend/data
    ports:
      - 3000:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: always
    pull_policy: always
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENID_PROVIDER_URL: ${OPENID_PROVIDER_URL}
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: true

  ollama:
    image: cagataygurturk/docker-ssh-tunnel:latest
    volumes:
      # Mount your local private SSH key (read-only)
      - ~/.ssh/id_ed25519:/root/ssh/id_ed25519:ro
    environment:
      LOCAL_PORT: 11434
      REMOTE_HOST: localhost
      REMOTE_PORT: 11434
      TUNNEL_HOST: ${OLLAMA_HOST}
    restart: always

  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
      pull: true
    volumes:
      - hermes-data:/opt/data
    ports:
      - 8642:8642
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      API_SERVER_ENABLED: true
      API_SERVER_KEY: your-secret-key-fob!
      API_SERVER_HOST: 0.0.0.0
      SEARXNG_URL: http://searxng-core:8080
    command: ["gateway"]
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: always
    pull_policy: always

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
      pull: true
      secrets:
        - clawhub_api_key
      args:
        - OPENCLAW_TAG=${OPENCLAW_TAG-latest}

    restart: always
    pull_policy: always
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GOOGLE_MAPS_LANG: ${GOOGLE_MAPS_LANG}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      BAIDU_API_KEY: ${BAIDU_API_KEY}
      CLAWHUB_API_KEY: ${CLAWHUB_API_KEY}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      OPENCLAW_NO_RESPAWN: 1
      NODE_COMPILE_CACHE: /var/tmp/openclaw-compile-cache
      SEARXNG_BASE_URL: http://searxng-core:8080
    volumes:
      - openclaw-data:/home/node
      - linuxbrew:/home/linuxbrew
    ports:
      - 18789:18789
    extra_hosts:
      - host.docker.internal:host-gateway

  searxng-core:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: always
    env_file: ./.env
    volumes:
      - ./searxng-settings.yml/:/etc/searxng/settings.yml:ro
      - core-data:/var/cache/searxng/
    pull_policy: always

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - valkey-data:/data/
    pull_policy: always

volumes:
  open-webui:
  hermes-data:
  linuxbrew:
  core-data:
  valkey-data:
  openclaw-data:
  jupyter-data:

secrets:
  clawhub_api_key:
    environment: "CLAWHUB_API_KEY"

